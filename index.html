<!DOCTYPE html>
<html>
<head>
    <title>index.html</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1410;
            --panel: #161d17;
            --panel-border: #2a3a2c;
            --accent: #4ade80;
            --accent-dim: #22c55e;
            --accent-glow: rgba(74,222,128,0.15);
            --text: #d1fae5;
            --text-muted: #6b7c6e;
            --danger: #f87171;
            --road: #60a5fa;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
            --sheet-collapsed: 64px;
            --sheet-peek: 220px;
            --sheet-full: 75vh;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%; margin: 0; padding: 0;
            background: var(--bg);
            font-family: var(--sans);
            color: var(--text);
            overflow: hidden;
        }
        #map {
            position: absolute;
            inset: 0;
            height: 100%;
            width: 100%;
            touch-action: pan-x pan-y;
        }
        #panel {
            position: absolute;
            top: 10px; right: 10px;
            z-index: 1000;
            width: 300px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(74,222,128,0.05);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 20px);
            overflow: hidden;
        }
        #panel.collapsed #panel-body { display: none; }
        #panel.collapsed { max-height: none; }
        #panel-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--panel-border);
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; user-select: none; flex-shrink: 0;
        }
        #panel-header .logo {
            width: 26px; height: 26px;
            background: var(--accent); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        #panel-header .logo svg { display: block; }
        #panel-header .title-block { flex: 1; min-width: 0; }
        #panel-header h1 {
            font-family: var(--mono); font-size: 12px; font-weight: 600;
            margin: 0; letter-spacing: 0.05em; color: var(--accent); text-transform: uppercase;
        }
        #panel-header .subtitle { font-size: 10px; color: var(--text-muted); margin: 0; font-family: var(--mono); }
        #toggle-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 2px; display: flex; align-items: center; transition: color 0.2s;
        }
        #toggle-btn:hover { color: var(--accent); }
        #toggle-icon { transition: transform 0.25s ease; }
        #panel.collapsed #toggle-icon { transform: rotate(180deg); }
        #panel-body { display: flex; flex-direction: column; overflow: hidden; flex: 1; min-height: 0; }
        #toolbar {
            padding: 8px 10px; border-bottom: 1px solid var(--panel-border);
            display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0;
        }
        .btn {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 10px; border-radius: 6px;
            font-family: var(--mono); font-size: 11px; font-weight: 500;
            border: 1px solid transparent; cursor: pointer;
            transition: all 0.15s; white-space: nowrap; -webkit-appearance: none;
        }
        .btn-primary { background: var(--accent-glow); border-color: var(--accent-dim); color: var(--accent); }
        .btn-primary:hover, .btn-primary:active { background: rgba(74,222,128,0.25); border-color: var(--accent); }
        .btn-road { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.4); color: var(--road); }
        .btn-road:hover, .btn-road:active { background: rgba(96,165,250,0.2); }
        .btn-ghost { background: transparent; border-color: var(--panel-border); color: var(--text-muted); }
        .btn-ghost:hover, .btn-ghost:active { border-color: var(--text-muted); color: var(--text); }
        .btn-danger { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--danger); }
        .btn-danger:hover, .btn-danger:active { background: rgba(248,113,113,0.2); }
        .btn svg { flex-shrink: 0; }
        #basemap-bar {
            padding: 7px 10px; border-bottom: 1px solid var(--panel-border);
            display: flex; gap: 4px; flex-shrink: 0;
        }
        .bm-btn {
            flex: 1; padding: 5px 4px; border-radius: 5px;
            font-family: var(--mono); font-size: 10px; font-weight: 500;
            border: 1px solid var(--panel-border); background: transparent;
            color: var(--text-muted); cursor: pointer; text-align: center;
            transition: all 0.15s; -webkit-appearance: none;
        }
        .bm-btn.active { background: var(--accent-glow); border-color: var(--accent-dim); color: var(--accent); }
        .bm-btn:hover:not(.active) { color: var(--text); border-color: #4a5a4c; }
        #shapes-section { flex: 1; overflow-y: auto; padding: 8px 10px; min-height: 0; }
        #shapes-section::-webkit-scrollbar { width: 4px; }
        #shapes-section::-webkit-scrollbar-track { background: transparent; }
        #shapes-section::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
        .section-label {
            font-family: var(--mono); font-size: 10px; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
        }
        #shapes-list { display: flex; flex-direction: column; gap: 4px; }
        .shape-item {
            display: flex; align-items: center; gap: 8px; padding: 8px 10px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--panel-border);
            border-radius: 7px; transition: border-color 0.15s; cursor: pointer;
        }
        .shape-item:hover, .shape-item:active { border-color: #3a4e3c; }
        .shape-item.selected { border-color: var(--accent-dim); background: var(--accent-glow); }
        .shape-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .shape-info { flex: 1; min-width: 0; }
        .shape-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
        .shape-meta { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-top: 1px; }
        .shape-actions { display: flex; gap: 4px; }
        .icon-btn {
            width: 28px; height: 28px; border-radius: 5px;
            border: 1px solid transparent; background: transparent;
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; padding: 0;
        }
        .icon-btn:hover, .icon-btn:active { border-color: var(--panel-border); color: var(--text); }
        .icon-btn.del:hover, .icon-btn.del:active { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,0.1); }
        .icon-btn.zoom:hover, .icon-btn.zoom:active { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-glow); }
        #empty-state {
            text-align: center; padding: 24px 10px;
            color: var(--text-muted); font-family: var(--mono); font-size: 11px; line-height: 1.7;
        }
        #stats-bar {
            padding: 9px 10px; border-top: 1px solid var(--panel-border);
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .stat { flex: 1; text-align: center; }
        .stat-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; font-family: var(--mono); }

        /* ── MOBILE BOTTOM SHEET ── */
        @media (max-width: 599px) {
            #panel {
                position: fixed; top: auto; right: 0; left: 0; bottom: 0; width: 100%;
                border-radius: 16px 16px 0 0;
                max-height: var(--sheet-full);
                height: var(--sheet-peek);
                transition: height 0.35s cubic-bezier(0.4,0,0.2,1);
                z-index: 1000; flex-shrink: 0;
            }
            #panel.sheet-collapsed { height: var(--sheet-collapsed) !important; }
            #panel.sheet-open { height: var(--sheet-full); }
            #panel.dragging { transition: none; }
            #panel.sheet-collapsed #panel-body { opacity: 0; pointer-events: none; }
            #panel-body { opacity: 1; transition: opacity 0.2s; }
            #panel-header::before {
                content: ''; position: absolute; top: 8px; left: 50%;
                transform: translateX(-50%); width: 36px; height: 4px;
                background: var(--panel-border); border-radius: 2px;
            }
            #panel-header { position: relative; padding-top: 20px; cursor: grab; }
            #panel-header:active { cursor: grabbing; }
            #toggle-btn { display: none; }
            #mobile-fab {
                display: flex; flex-direction: column; gap: 8px;
                position: fixed; right: 12px;
                bottom: calc(var(--sheet-peek) + 12px);
                z-index: 999;
                transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1);
            }
            .fab-btn {
                width: 48px; height: 48px; border-radius: 50%; border: none;
                cursor: pointer; display: flex; align-items: center; justify-content: center;
                box-shadow: 0 4px 16px rgba(0,0,0,0.5);
                transition: transform 0.15s, box-shadow 0.15s; -webkit-appearance: none;
            }
            .fab-btn:active { transform: scale(0.92); }
            .fab-field { background: var(--accent); color: #0f1410; }
            .fab-road  { background: var(--road);   color: #0f1410; }
            .fab-locate { background: var(--panel); color: var(--text); border: 1px solid var(--panel-border); }
            .leaflet-bottom.leaflet-left {
                bottom: calc(var(--sheet-peek) + 8px) !important;
                transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1);
            }
            .leaflet-top.leaflet-left  { top: 10px; left: 10px; }
            .leaflet-top.leaflet-right { top: 10px; right: 10px; }
        }
        #mobile-fab { display: none; }

        /* ── MODAL ── */
        #modal-overlay {
            display: none; position: fixed; inset: 0;
            z-index: 9999; background: rgba(0,0,0,0.75);
            align-items: center; justify-content: center;
        }
        #modal-overlay.open { display: flex; }
        #modal {
            background: var(--panel); border: 1px solid var(--panel-border);
            border-radius: 12px; padding: 20px; width: min(320px, calc(100vw - 32px));
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        #modal h3 { margin: 0 0 4px; font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
        #modal p  { margin: 0 0 14px; font-size: 12px; color: var(--text-muted); }
        #modal input {
            width: 100%; padding: 10px 12px;
            background: var(--bg); border: 1px solid var(--panel-border);
            border-radius: 6px; color: var(--text);
            font-family: var(--mono); font-size: 14px;
            outline: none; margin-bottom: 12px; transition: border-color 0.15s;
        }
        #modal input:focus { border-color: var(--accent-dim); }
        #modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 90px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--panel); border: 1px solid var(--accent-dim);
            color: var(--accent); font-family: var(--mono); font-size: 12px;
            padding: 8px 16px; border-radius: 20px;
            z-index: 9998; transition: transform 0.3s ease;
            pointer-events: none; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── LEAFLET OVERRIDES ── */
        .leaflet-control-zoom a, .leaflet-draw-toolbar a {
            background-color: var(--panel) !important; color: var(--accent) !important;
            border-color: var(--panel-border) !important;
            width: 32px !important; height: 32px !important; line-height: 32px !important;
        }
        .leaflet-control-zoom a:hover, .leaflet-draw-toolbar a:hover { background-color: var(--accent-glow) !important; }
        .leaflet-bar { border: 1px solid var(--panel-border) !important; box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important; }
        .leaflet-control-scale-line {
            background: rgba(22,29,23,0.85) !important; border-color: var(--accent-dim) !important;
            color: var(--text) !important; font-family: var(--mono) !important; font-size: 10px !important;
        }

        /* ── LOCATION DOT ──
           iconSize 24x24, iconAnchor 12x12 — centres the div on the coordinate.
           Children fill the box; pulse expands outward from centre via scale(). */
        .loc-dot-wrapper {
            position: relative;
            width: 24px; height: 24px;
        }
        .loc-pulse {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(96,165,250,0.3);
            border: 1.5px solid rgba(96,165,250,0.55);
            animation: loc-ping 2s ease-out infinite;
        }
        .loc-core {
            position: absolute;
            width: 14px; height: 14px;
            top: 5px; left: 5px;
            border-radius: 50%;
            background: #60a5fa;
            border: 2.5px solid #fff;
            box-shadow: 0 0 0 1px rgba(96,165,250,0.5), 0 2px 8px rgba(0,0,0,0.6);
        }
        @keyframes loc-ping {
            0%   { transform: scale(1);   opacity: 0.8; }
            70%  { transform: scale(2.8); opacity: 0; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* Tracking active state for buttons */
        .fab-locate.tracking {
            background: #60a5fa !important; color: #0f1410 !important;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.35), 0 4px 16px rgba(0,0,0,0.5) !important;
        }
        #btn-locate-panel.tracking {
            border-color: var(--road) !important; color: var(--road) !important;
            background: rgba(96,165,250,0.1) !important;
        }
    </style>
</head>
<body>
<div id="map"></div>

<!-- MOBILE FABs -->
<div id="mobile-fab">
    <button class="fab-btn fab-locate" id="fab-locate" onclick="toggleTracking()" title="Track my location">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="10" cy="10" r="4"/>
            <line x1="10" y1="1" x2="10" y2="5"/><line x1="10" y1="15" x2="10" y2="19"/>
            <line x1="1" y1="10" x2="5" y2="10"/><line x1="15" y1="10" x2="19" y2="10"/>
        </svg>
    </button>
    <button class="fab-btn fab-road" onclick="startDraw('polyline')" title="Draw road">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 18L6 9L13 12L18 3"/>
        </svg>
    </button>
    <button class="fab-btn fab-field" onclick="startDraw('polygon')" title="Draw field">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 1L18 6.5V13.5L10 19L2 13.5V6.5L10 1Z" opacity="0.3"/>
            <path d="M10 1L18 6.5V13.5L10 19L2 13.5V6.5L10 1Z" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
    </button>
</div>

<!-- PANEL -->
<div id="panel">
    <div id="panel-header" onclick="togglePanel()">
        <div class="logo">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M8 1L14 5V11L8 15L2 11V5L8 1Z" stroke="#0f1410" stroke-width="1.5" fill="none"/>
                <circle cx="8" cy="8" r="2" fill="#0f1410"/>
            </svg>
        </div>
        <div class="title-block">
            <h1>Field Mapper</h1>
            <p class="subtitle">Draw · Name · Export</p>
        </div>
        <button id="toggle-btn" onclick="event.stopPropagation();togglePanel()" title="Toggle panel">
            <svg id="toggle-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8">
                <polyline points="2,9 7,4 12,9"/>
            </svg>
        </button>
    </div>
    <div id="panel-body">
        <div id="toolbar">
            <button class="btn btn-primary" onclick="startDraw('polygon')">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0L11 3.5V8.5L6 12L1 8.5V3.5L6 0Z"/></svg>
                Field
            </button>
            <button class="btn btn-road" onclick="startDraw('polyline')">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 11L4 5L8 7L11 1"/></svg>
                Road
            </button>
            <button class="btn btn-ghost" id="btn-locate-panel" onclick="toggleTracking()">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="2.5"/><line x1="6" y1="1" x2="6" y2="3"/><line x1="6" y1="9" x2="6" y2="11"/><line x1="1" y1="6" x2="3" y2="6"/><line x1="9" y1="6" x2="11" y2="6"/></svg>
                Locate
            </button>
            <button class="btn btn-ghost" onclick="exportGeoJSON()">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v7M3 5l3 3 3-3M2 10h8"/></svg>
                Export
            </button>
            <button class="btn btn-ghost" onclick="importFile()">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 8V1M3 4L6 1l3 3M2 10h8"/></svg>
                Import
            </button>
            <button class="btn btn-danger" onclick="clearAll()">
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h8M5 3V2h2v1M10 3l-.8 7H2.8L2 3"/></svg>
                Clear
            </button>
        </div>
        <div id="basemap-bar">
            <button class="bm-btn active" onclick="setBasemap('satellite',this)">Satellite</button>
            <button class="bm-btn" onclick="setBasemap('osm',this)">Street</button>
            <button class="bm-btn" onclick="setBasemap('terrain',this)">Terrain</button>
        </div>
        <div id="shapes-section">
            <div class="section-label">Layers</div>
            <div id="shapes-list">
                <div id="empty-state">No shapes yet.<br>Draw a field or road<br>to get started.</div>
            </div>
        </div>
        <div id="stats-bar">
            <div class="stat"><div class="stat-val" id="stat-fields">0</div><div class="stat-label">Fields</div></div>
            <div class="stat"><div class="stat-val" id="stat-roads">0</div><div class="stat-label">Roads</div></div>
            <div class="stat"><div class="stat-val" id="stat-area">0 ha</div><div class="stat-label">Total Area</div></div>
        </div>
    </div>
</div>

<!-- NAME MODAL -->
<div id="modal-overlay">
    <div id="modal">
        <h3 id="modal-title">Name this shape</h3>
        <p id="modal-desc">Give it a descriptive name</p>
        <input type="text" id="modal-input" placeholder="e.g. North Field" autocomplete="off" />
        <div class="modal-btns">
            <button class="btn btn-ghost" onclick="closeModal(false)">Cancel</button>
            <button class="btn btn-primary" onclick="closeModal(true)">Save</button>
        </div>
    </div>
</div>

<div id="toast"></div>
<input type="file" id="file-input" accept=".geojson,.json" style="display:none" onchange="handleImport(event)">

<script>
const basemaps = {
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri', maxZoom: 19 }),
    osm:       L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 }),
    terrain:   L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles &copy; Esri', maxZoom: 19 })
};

const map = L.map('map', { zoomControl: true }).setView([40.2934, 23.5428], 15);
basemaps.satellite.addTo(map);
L.control.scale({ imperial: false, metric: true, position: 'bottomleft' }).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const drawControl = new L.Control.Draw({
    position: 'topleft',
    draw: {
        polygon:  { shapeOptions: { color:'#4ade80', fillColor:'#4ade80', fillOpacity:0.2, weight:2 } },
        polyline: { shapeOptions: { color:'#60a5fa', weight:3 } },
        rectangle:false, circle:false, marker:false, circlemarker:false
    },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

let shapes = [], shapeCounter = 0, modalResolve = null;
const isMobile = () => window.innerWidth < 600;

// ── PANEL / SHEET ────────────────────────────────────────
const panel = document.getElementById('panel');
let sheetState = 'peek';

function togglePanel() {
    if (isMobile()) cycleSheet();
    else panel.classList.toggle('collapsed');
}
function cycleSheet() {
    if (sheetState === 'collapsed') setSheet('peek');
    else if (sheetState === 'peek') setSheet('open');
    else setSheet('collapsed');
}
function setSheet(state) {
    sheetState = state;
    panel.classList.remove('sheet-collapsed','sheet-open');
    if (state === 'collapsed') panel.classList.add('sheet-collapsed');
    if (state === 'open')      panel.classList.add('sheet-open');
    updateFabPosition();
}
function updateFabPosition() {
    const fab = document.getElementById('mobile-fab');
    if (!fab || !isMobile()) return;
    const heights = { collapsed: 64, peek: 220, open: window.innerHeight * 0.75 };
    fab.style.bottom = (heights[sheetState] + 12) + 'px';
}

// Touch drag
let dragStartY = 0, dragStartH = 0, isDragging = false;
document.getElementById('panel-header').addEventListener('touchstart', e => {
    if (!isMobile()) return;
    dragStartY = e.touches[0].clientY;
    dragStartH = panel.getBoundingClientRect().height;
    isDragging = true;
    panel.classList.add('dragging');
}, { passive: true });
window.addEventListener('touchmove', e => {
    if (!isDragging || !isMobile()) return;
    const dy = dragStartY - e.touches[0].clientY;
    const newH = Math.min(Math.max(dragStartH + dy, 64), window.innerHeight * 0.85);
    panel.style.height = newH + 'px';
    const fab = document.getElementById('mobile-fab');
    if (fab) fab.style.bottom = (newH + 12) + 'px';
}, { passive: true });
window.addEventListener('touchend', () => {
    if (!isDragging || !isMobile()) return;
    isDragging = false;
    panel.classList.remove('dragging');
    panel.style.height = '';
    const h = panel.getBoundingClientRect().height;
    if (h < 100) setSheet('collapsed');
    else if (h < window.innerHeight * 0.75 * 0.6) setSheet('peek');
    else setSheet('open');
});

// ── DRAW ─────────────────────────────────────────────────
map.on(L.Draw.Event.CREATED, async function(e) {
    const type = e.layerType, layer = e.layer;
    const isField = type === 'polygon';
    const defaultName = isField
        ? `Field ${shapes.filter(s=>s.type==='polygon').length + 1}`
        : `Road ${shapes.filter(s=>s.type==='polyline').length + 1}`;
    const name = await promptName(
        isField ? 'Name this field' : 'Name this road',
        isField ? 'Give your field a descriptive name' : 'Give this road or path a name',
        defaultName
    );
    if (!name) return;
    const id = ++shapeCounter;
    const color = isField ? '#4ade80' : '#60a5fa';
    layer.setStyle && layer.setStyle({ color, fillColor:isField?color:undefined, fillOpacity:isField?0.2:undefined, weight:isField?2:3 });
    drawnItems.addLayer(layer);
    shapes.push({ id, name, type, layer, color });
    renderShapeList(); updateStats(); saveToStorage();
    showToast(`✓ "${name}" saved`);
    if (isMobile() && sheetState !== 'open') setSheet('peek');
});
map.on(L.Draw.Event.DELETED, function(e) {
    e.layers.eachLayer(l => { shapes = shapes.filter(s=>s.layer!==l); });
    renderShapeList(); updateStats(); saveToStorage();
});
map.on(L.Draw.Event.EDITED, function() { updateStats(); saveToStorage(); });

// ── MODAL ────────────────────────────────────────────────
function promptName(title, desc, defaultVal) {
    return new Promise(resolve => {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-desc').textContent = desc;
        const input = document.getElementById('modal-input');
        input.value = defaultVal;
        document.getElementById('modal-overlay').classList.add('open');
        setTimeout(() => { input.focus(); input.select(); }, 100);
        modalResolve = resolve;
    });
}
function closeModal(save) {
    const input = document.getElementById('modal-input');
    const val = save ? (input.value.trim() || input.placeholder) : null;
    document.getElementById('modal-overlay').classList.remove('open');
    if (modalResolve) { modalResolve(val); modalResolve = null; }
}
document.getElementById('modal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') closeModal(true);
    if (e.key === 'Escape') closeModal(false);
});

// ── SHAPE LIST ───────────────────────────────────────────
function renderShapeList() {
    const list = document.getElementById('shapes-list');
    if (!shapes.length) {
        list.innerHTML = '<div id="empty-state" style="text-align:center;padding:24px 10px;color:var(--text-muted);font-family:var(--mono);font-size:11px;line-height:1.7">No shapes yet.<br>Draw a field or road<br>to get started.</div>';
        return;
    }
    list.innerHTML = shapes.map(s => {
        const meta = s.type==='polygon' ? getAreaStr(s.layer) : getLengthStr(s.layer);
        return `<div class="shape-item" id="item-${s.id}" onclick="zoomTo(${s.id})">
            <div class="shape-dot" style="background:${s.color}"></div>
            <div class="shape-info">
                <div class="shape-name">${escHtml(s.name)}</div>
                <div class="shape-meta">${s.type==='polygon'?'Field':'Road'} · ${meta}</div>
            </div>
            <div class="shape-actions">
                <button class="icon-btn zoom" onclick="event.stopPropagation();zoomTo(${s.id})">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="5" r="3.5"/><line x1="7.5" y1="7.5" x2="11" y2="11"/></svg>
                </button>
                <button class="icon-btn del" onclick="event.stopPropagation();deleteShape(${s.id})">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
                </button>
            </div>
        </div>`;
    }).join('');
}

// ── ACTIONS ──────────────────────────────────────────────
function startDraw(type) {
    if (isMobile()) setSheet('collapsed');
    if (type === 'polygon')  new L.Draw.Polygon(map).enable();
    if (type === 'polyline') new L.Draw.Polyline(map).enable();
}
function zoomTo(id) {
    const s = shapes.find(x=>x.id===id); if (!s) return;
    map.fitBounds(s.layer.getBounds(), { padding:[40,40] });
    document.querySelectorAll('.shape-item').forEach(el=>el.classList.remove('selected'));
    document.getElementById(`item-${id}`)?.classList.add('selected');
    if (isMobile()) setSheet('peek');
}
function deleteShape(id) {
    const idx = shapes.findIndex(x=>x.id===id); if (idx===-1) return;
    drawnItems.removeLayer(shapes[idx].layer);
    shapes.splice(idx,1);
    renderShapeList(); updateStats(); saveToStorage();
    showToast('Shape deleted');
}
function clearAll() {
    if (!shapes.length) return;
    if (!confirm(`Delete all ${shapes.length} shape(s)?`)) return;
    drawnItems.clearLayers(); shapes = [];
    renderShapeList(); updateStats(); saveToStorage();
    showToast('All shapes cleared');
}

// ── LOCATION TRACKING ────────────────────────────────────
// Three bugs fixed vs the original:
//   1. iconSize/iconAnchor were [0,0] — dot was placed at wrong position
//   2. visibilitychange stopped the watch when the permission dialog appeared
//   3. accuracy circle used className instead of path options — never rendered

let tracking = false, locationMarker = null, accuracyCircle = null, watchId = null, firstFix = true;

function toggleTracking() {
    if (tracking) stopTracking(); else startTracking();
}

function startTracking() {
    if (!navigator.geolocation) { showToast('⚠ Geolocation not supported'); return; }
    tracking = true; firstFix = true;
    setTrackingUI(true);
    if (isMobile()) setSheet('collapsed');
    showToast('Locating…');
    watchId = navigator.geolocation.watchPosition(
        onLocationUpdate,
        onLocationError,
        { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 }
    );
}

function stopTracking() {
    tracking = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (locationMarker)  { map.removeLayer(locationMarker);  locationMarker = null; }
    if (accuracyCircle)  { map.removeLayer(accuracyCircle);  accuracyCircle = null; }
    setTrackingUI(false);
    showToast('Tracking stopped');
}

function setTrackingUI(on) {
    document.getElementById('fab-locate')?.classList.toggle('tracking', on);
    document.getElementById('btn-locate-panel')?.classList.toggle('tracking', on);
}

function onLocationUpdate(pos) {
    const { latitude: lat, longitude: lng, accuracy } = pos.coords;
    const latlng = L.latLng(lat, lng);

    // Dot — iconSize 24x24, iconAnchor 12x12 centres it on the coordinate
    if (!locationMarker) {
        const icon = L.divIcon({
            className: '',
            html: '<div class="loc-dot-wrapper"><div class="loc-pulse"></div><div class="loc-core"></div></div>',
            iconSize:   [24, 24],
            iconAnchor: [12, 12]
        });
        locationMarker = L.marker(latlng, { icon, zIndexOffset: 900, interactive: false, keyboard: false });
        locationMarker.addTo(map);
    } else {
        locationMarker.setLatLng(latlng);
    }

    // Accuracy circle — path options, NOT className
    if (!accuracyCircle) {
        accuracyCircle = L.circle(latlng, {
            radius: accuracy, interactive: false,
            stroke: true,  color: '#60a5fa', weight: 1, opacity: 0.5,
            fill:   true,  fillColor: '#60a5fa', fillOpacity: 0.07
        }).addTo(map);
        accuracyCircle.bringToBack();
    } else {
        accuracyCircle.setLatLng(latlng);
        accuracyCircle.setRadius(accuracy);
    }

    // Pan only on first fix
    if (firstFix) {
        map.setView(latlng, Math.max(map.getZoom(), 17));
        firstFix = false;
        const acc = accuracy < 1000 ? `${Math.round(accuracy)} m` : `${(accuracy/1000).toFixed(1)} km`;
        showToast(`✓ Located · ±${acc}`);
    }
}

function onLocationError(err) {
    // Timeout (code 3): keep watching, just warn
    if (err.code === 3) { showToast('⚠ GPS signal weak, retrying…'); return; }
    stopTracking();
    showToast(err.code === 1 ? '⚠ Location permission denied' : '⚠ Position unavailable');
}

// ── BASEMAP ──────────────────────────────────────────────
let currentBasemap = 'satellite';
function setBasemap(name, btn) {
    if (name === currentBasemap) return;
    map.removeLayer(basemaps[currentBasemap]);
    basemaps[name].addTo(map);
    drawnItems.bringToFront();
    currentBasemap = name;
    document.querySelectorAll('.bm-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

// ── EXPORT / IMPORT ──────────────────────────────────────
function exportGeoJSON() {
    if (!shapes.length) { showToast('Nothing to export'); return; }
    const fc = { type:'FeatureCollection', features: shapes.map(s => {
        const gj = s.layer.toGeoJSON(); gj.properties = { name:s.name, type:s.type }; return gj;
    })};
    const url = URL.createObjectURL(new Blob([JSON.stringify(fc,null,2)], { type:'application/json' }));
    Object.assign(document.createElement('a'), { href:url, download:`field-map-${new Date().toISOString().slice(0,10)}.geojson` }).click();
    URL.revokeObjectURL(url);
    showToast(`✓ Exported ${shapes.length} shape(s)`);
}
function importFile() { document.getElementById('file-input').click(); }
function handleImport(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => { try { loadGeoJSON(JSON.parse(e.target.result)); showToast('✓ Imported'); } catch { showToast('⚠ Invalid GeoJSON'); } };
    reader.readAsText(file); event.target.value = '';
}
function loadGeoJSON(gj) {
    (gj.type==='FeatureCollection' ? gj.features : [gj]).forEach(f => {
        const layer = L.geoJSON(f).getLayers()[0]; if (!layer) return;
        const type = f.geometry.type==='Polygon' ? 'polygon' : 'polyline';
        const name = f.properties?.name || (type==='polygon' ? `Field ${++shapeCounter}` : `Road ${++shapeCounter}`);
        const color = type==='polygon' ? '#4ade80' : '#60a5fa';
        layer.setStyle && layer.setStyle({ color, fillColor:type==='polygon'?color:undefined, fillOpacity:type==='polygon'?0.2:undefined, weight:type==='polygon'?2:3 });
        drawnItems.addLayer(layer);
        shapes.push({ id:++shapeCounter, name, type, layer, color });
    });
    renderShapeList(); updateStats(); saveToStorage();
    if (shapes.length) map.fitBounds(drawnItems.getBounds(), { padding:[30,30] });
}

// ── STATS ────────────────────────────────────────────────
function updateStats() {
    const fields = shapes.filter(s=>s.type==='polygon');
    const roads  = shapes.filter(s=>s.type==='polyline');
    let totalArea = 0; fields.forEach(s => { totalArea += getAreaM2(s.layer); });
    document.getElementById('stat-fields').textContent = fields.length;
    document.getElementById('stat-roads').textContent  = roads.length;
    document.getElementById('stat-area').textContent   = formatArea(totalArea);
}
function getAreaM2(layer) { try { return Math.abs(sphericalPolygonArea(layer.getLatLngs()[0])); } catch { return 0; } }
function sphericalPolygonArea(ll) {
    const R=6371000, r=d=>d*Math.PI/180; let a=0, n=ll.length;
    for (let i=0;i<n;i++) { const j=(i+1)%n; a+=r(ll[j].lng-ll[i].lng)*(2+Math.sin(r(ll[i].lat))+Math.sin(r(ll[j].lat))); }
    return Math.abs(a*R*R/2);
}
function formatArea(m2) { return m2<10000 ? `${Math.round(m2)} m²` : `${(m2/10000).toFixed(1)} ha`; }
function getAreaStr(layer)   { try { return formatArea(getAreaM2(layer)); } catch { return '—'; } }
function getLengthStr(layer) {
    try {
        const ll=layer.getLatLngs(); let len=0;
        for (let i=0;i<ll.length-1;i++) len+=ll[i].distanceTo(ll[i+1]);
        return len>=1000 ? `${(len/1000).toFixed(2)} km` : `${Math.round(len)} m`;
    } catch { return '—'; }
}

// ── STORAGE ──────────────────────────────────────────────
function saveToStorage() {
    try {
        localStorage.setItem('fieldmapper_shapes', JSON.stringify(shapes.map(s=>({ id:s.id,name:s.name,type:s.type,color:s.color,geojson:s.layer.toGeoJSON() }))));
        localStorage.setItem('fieldmapper_counter', shapeCounter);
    } catch(e) { console.warn('Save failed',e); }
}
function loadFromStorage() {
    try {
        const cnt = localStorage.getItem('fieldmapper_counter'); if (cnt) shapeCounter = parseInt(cnt);
        const raw = localStorage.getItem('fieldmapper_shapes'); if (!raw) return;
        JSON.parse(raw).forEach(d => {
            const layer = L.geoJSON(d.geojson).getLayers()[0]; if (!layer) return;
            layer.setStyle && layer.setStyle({ color:d.color, fillColor:d.type==='polygon'?d.color:undefined, fillOpacity:d.type==='polygon'?0.2:undefined, weight:d.type==='polygon'?2:3 });
            drawnItems.addLayer(layer);
            shapes.push({ id:d.id,name:d.name,type:d.type,layer,color:d.color });
        });
        if (shapes.length) { renderShapeList(); updateStats(); setTimeout(()=>map.fitBounds(drawnItems.getBounds(),{padding:[30,30]}),100); }
    } catch(e) { console.warn('Load failed',e); }
}

// ── UTILS ─────────────────────────────────────────────────
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove('show'), 2500);
}
window.addEventListener('resize', () => {
    if (isMobile()) updateFabPosition();
    else { panel.classList.remove('sheet-collapsed','sheet-open'); panel.style.height=''; }
});

// ── INIT ──────────────────────────────────────────────────
loadFromStorage();
renderShapeList();
updateStats();
if (isMobile()) setSheet('peek');
</script>
</body>
</html>
